name: Docs Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-static-branch
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build

      - name: Publish built static files to deploy branch
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          BRANCH="gh-pages"
          BUILD_DIR="${GITHUB_WORKSPACE}/website/build"
          PUBLISH_DIR="$(mktemp -d)"

          if [ ! -f "${BUILD_DIR}/index.html" ]; then
            echo "Expected built docs at ${BUILD_DIR}/index.html" >&2
            exit 1
          fi

          cp -a "${BUILD_DIR}/." "${PUBLISH_DIR}/"
          touch "${PUBLISH_DIR}/.nojekyll"

          cd "${PUBLISH_DIR}"
          git init
          git checkout -b "${BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Publish docs for ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin "HEAD:${BRANCH}"
